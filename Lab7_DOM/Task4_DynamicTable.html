<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Table Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 bg-gray-50">
    <h1 class="text-xl font-bold mb-4">Dynamic Table Generator</h1>
    
    <div class="mb-4 flex gap-4 items-center">
        <label>Rows: <input type="number" id="rows" class="border w-16 p-1"></label>
        <label>Columns: <input type="number" id="cols" class="border w-16 p-1"></label>
        <button onclick="generateTable()" class="bg-gray-200 border px-4 py-1 hover:bg-gray-300">Generate Table</button>
    </div>

    <div id="table-container" class="mt-8"></div>

    <script>
        function generateTable() {
            const rows = parseInt(document.getElementById('rows').value);
            const cols = parseInt(document.getElementById('cols').value);
            const container = document.getElementById('table-container');

            if (!rows || !cols || rows < 1 || cols < 1) {
                alert("Please enter valid positive numbers for rows and columns.");
                return;
            }

            container.innerHTML = ''; 
            const table = document.createElement('table');
            table.className = "w-full text-center border-collapse bg-white shadow";

            for (let i = 1; i <= rows; i++) {
                const tr = document.createElement('tr');
                if (i % 2 === 0) tr.style.backgroundColor = '#f9fafb'; 

                for (let j = 1; j <= cols; j++) {
                    const td = document.createElement('td');
                    td.className = "border p-3 transition-colors duration-200";
                    td.innerText = `(${i}, ${j})`;

                    td.addEventListener('mouseover', () => {
                        td.dataset.origColor = td.style.backgroundColor;
                        td.style.backgroundColor = '#e5e7eb';
                    });
                    td.addEventListener('mouseout', () => {
                        td.style.backgroundColor = td.dataset.origColor || '';
                    });
                    
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
            container.appendChild(table);
        }
    </script>
</body>
</html>
