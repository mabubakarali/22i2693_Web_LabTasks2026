<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 bg-gray-50 flex flex-col items-center">
    <div id="quiz-container" class="w-full max-w-2xl bg-white p-6 rounded shadow">
        <div id="progress-bar-container" class="w-full bg-gray-200 h-4 rounded mb-6">
            <div id="progress-bar" class="bg-green-600 h-4 rounded w-0 transition-all duration-300"></div>
        </div>
        <div id="question-area"></div>
    </div>
    
    <div id="scoreboard" class="w-full max-w-2xl mt-8 hidden">
        <h2 class="text-xl font-bold mb-4">Scoreboard</h2>
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-100">
                    <th class="border p-2">Question</th>
                    <th class="border p-2">Your Answer</th>
                    <th class="border p-2">Correct Answer</th>
                    <th class="border p-2">Mark</th>
                </tr>
            </thead>
            <tbody id="score-body"></tbody>
        </table>
    </div>

    <script>
        const questions = [
            { q: "Capital of France?", options: ["Paris", "London", "Rome", "Berlin"], ans: "Paris" },
            { q: "2 + 2 * 2 = ?", options: ["8", "6", "4", "2"], ans: "6" },
            { q: "JS full form?", options: ["JavaScript", "Java", "JScript", "JS"], ans: "JavaScript" },
            { q: "Earth is?", options: ["Square", "Round", "Flat", "Triangle"], ans: "Round" },
            { q: "HTML stands for?", options: ["Hyper Text", "Home Tool", "Hyperlinks", "None"], ans: "Hyper Text" }
        ];

        let currentQ = 0;
        let userAnswers = [];

        function renderQuestion() {
            if (currentQ >= questions.length) return showScoreboard();

            const progress = ((currentQ) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const qData = questions[currentQ];
            let html = `<h2 class="text-lg mb-4">Q${currentQ + 1}: ${qData.q}</h2><div class="space-x-2">`;
            
            qData.options.forEach(opt => {
                html += `<button class="px-4 py-2 border rounded hover:bg-gray-100" onclick="answer('${opt}')">${opt}</button>`;
            });
            html += `</div>`;
            document.getElementById('question-area').innerHTML = html;
        }

        function answer(selected) {
            userAnswers.push({ q: questions[currentQ].q, selected, correct: questions[currentQ].ans });
            currentQ++;
            renderQuestion();
        }

        function showScoreboard() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('scoreboard').classList.remove('hidden');
            
            const tbody = document.getElementById('score-body');
            userAnswers.forEach((ans, i) => {
                const isCorrect = ans.selected === ans.correct;
                const rowClass = isCorrect ? 'bg-green-100' : 'bg-red-100';
                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td class="border p-2">Q${i+1}: ${ans.q}</td>
                        <td class="border p-2">${ans.selected}</td>
                        <td class="border p-2">${ans.correct}</td>
                        <td class="border p-2">${isCorrect ? '1' : '0'}</td>
                    </tr>
                `;
            });
        }

        renderQuestion();
    </script>
</body>
</html>
