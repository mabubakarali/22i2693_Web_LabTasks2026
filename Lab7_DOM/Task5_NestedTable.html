<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 bg-gray-50">
    <h1 class="text-xl font-bold mb-4">Students Table</h1>
    
    <input type="text" id="search" placeholder="Search by name or course..." class="border p-2 w-64 mb-4 rounded" onkeyup="renderTable()">

    <table class="w-full bg-white shadow border-collapse text-left">
        <thead>
            <tr class="bg-gray-100 border-b">
                <th class="p-3 cursor-pointer hover:bg-gray-200" onclick="sortData('name')">Student Name &#x21D5;</th>
                <th class="p-3">Course</th>
                <th class="p-3 cursor-pointer hover:bg-gray-200" onclick="sortData('score')">Score &#x21D5;</th>
            </tr>
        </thead>
        <tbody id="student-body"></tbody>
    </table>

    <script>
        let students = [
            { id: 1, name: "Alice", courses: [{ name: "Math", score: 85 }, { name: "Physics", score: 48 }] },
            { id: 2, name: "Bob", courses: [{ name: "Chemistry", score: 92 }] },
            { id: 3, name: "Charlie", courses: [{ name: "Biology", score: 35 }, { name: "Math", score: 70 }] }
        ];

        let sortAsc = true;

        function renderTable() {
            const tbody = document.getElementById('student-body');
            const term = document.getElementById('search').value.toLowerCase();
            tbody.innerHTML = '';

            students.forEach(student => {
                const matchesName = student.name.toLowerCase().includes(term);
                const matchedCourses = student.courses.filter(c => c.name.toLowerCase().includes(term));
                
                if (matchesName || matchedCourses.length > 0) {
                    const row = document.createElement('tr');
                    row.className = "border-b cursor-pointer hover:bg-gray-50";
                    row.innerHTML = `<td class="p-3 font-semibold text-blue-800">&#9660; ${student.name}</td><td></td><td></td>`;
                    
                    const detailsTr = document.createElement('tr');
                    detailsTr.className = "bg-gray-50";
                    let detailsHtml = '<td colspan="3" class="p-0"><table class="w-full">';
                    
                    const coursesToRender = matchesName ? student.courses : matchedCourses;
                    coursesToRender.forEach(c => {
                        const style = c.score < 50 ? 'bg-red-100 text-red-800' : '';
                        detailsHtml += `<tr class="${style} border-b"><td class="p-2 w-1/3"></td><td class="p-2 w-1/3">${c.name}</td><td class="p-2 w-1/3">${c.score}</td></tr>`;
                    });
                    
                    detailsHtml += '</table></td>';
                    detailsTr.innerHTML = detailsHtml;

                    row.onclick = () => {
                        detailsTr.classList.toggle('hidden');
                        row.querySelector('td').innerHTML = detailsTr.classList.contains('hidden') ? `&#9658; ${student.name}` : `&#9660; ${student.name}`;
                    };

                    tbody.appendChild(row);
                    tbody.appendChild(detailsTr);
                }
            });
        }

        function sortData(key) {
            sortAsc = !sortAsc;
            students.sort((a, b) => {
                let valA = key === 'name' ? a.name : Math.max(...a.courses.map(c=>c.score));
                let valB = key === 'name' ? b.name : Math.max(...b.courses.map(c=>c.score));
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
            renderTable();
        }

        renderTable();
    </script>
</body>
</html>
