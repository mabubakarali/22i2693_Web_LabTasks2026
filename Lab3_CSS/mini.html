<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="grid-layout"> 
    <div class="grid-header" 
         style="background:#2c3e50; 
         color:white;">
        <h2>Student Portal</h2>
    </div>
    <div class="grid-sidebar" style="background:#4c5050;">
        <p>Dashboard</p>
        <p>Profile</p>
        <p>Courses</p>
        <p>Settings</p>
    </div>
    <div class="grid-main">
        <h3>My Courses</h3>
        <div class="flex-content" style="padding:0;"> 
            <div class="flex-card" style="background:#4c5050;">
                <h4>Web Engineering</h4>
                <div class="card-wrapper">
                    <span class="mini-badge">New</span>
                </div>
            </div>
            <div class="flex-card" style="background:#4c5050;">
                <h4>SPM</h4>
            </div>
            <div class="flex-card" style="background:#4c5050;">
                <h4>Operating Systems</h4>
            </div>
        </div>
    </div>
    <div class="grid-footer">CSS Lab Task 3</div>
</body>
</html>
