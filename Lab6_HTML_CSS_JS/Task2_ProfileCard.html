<!DOCTYPE html>
<html>
<head>
    <title>Task 2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
            font-family: Arial;
        }
        .card {
            background: white;
            width: 300px;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        img {
            width: 100px;
            border-radius: 50%;
        }
        .extra {
            display: none;
            margin-top: 10px;
        }
        button {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="card">
    <img src="1.jfif" alt="Student">
    <h3>Muhammad Abubakar Ali</h3>
    <p>Reg No: 22i-2693</p>
    <p>Department: Software Engineering</p>
    <div class="extra" id="extraInfo">
        <p>Hobbies: Gym, Coding</p>
        <p>Skills: HTML, CSS, JS, React</p>
        <p>Email: i222693@nu.edu.pk</p>
    </div>
    <button id="toggleBtn">Show More</button>
</div>
<script>
    const btn = document.getElementById("toggleBtn");
    const extra = document.getElementById("extraInfo");
    btn.addEventListener("click", () => {
        if (extra.style.display === "none" || extra.style.display === "") {
            extra.style.display = "block";
            btn.textContent = "Show Less";
        } else {
            extra.style.display = "none";
            btn.textContent = "Show More";
        }
    });
</script>
</body>
</html>
