<!DOCTYPE html>
<html>
<head>
    <title>Task 3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #222;
            --nav-bg: #ffffff;
            --btn-bg: #007bff;
            --btn-text: #ffffff;
        }
        body.dark {
            --bg-color: #222;
            --text-color: #f8f9fa;
            --nav-bg: #333;
            --btn-bg: #17a2b8;
            --btn-text: #ffffff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s ease;
        }
        header {
            background: var(--nav-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            transition: 0.3s ease;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
        }
        nav {
            display: flex;
            gap: 20px;
        }
        nav a {
            text-decoration: none;
            color: var(--text-color);
            transition: 0.3s;
        }
        nav a:hover {
            color: var(--btn-bg);
        }
        .right-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .theme-toggle {
            cursor: pointer;
            padding: 5px 10px;
            border: 1px solid var(--text-color);
            border-radius: 5px;
            transition: 0.3s;
        }
        .theme-toggle:hover {
            background: var(--btn-bg);
            color: var(--btn-text);
            border-color: var(--btn-bg);
        }
        .hamburger {
            display: none;
            font-size: 22px;
            cursor: pointer;
        }
        .hero {
            padding: 80px 20px;
            text-align: center;
            transition: 0.3s ease;
        }
        .hero h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        .hero p {
            margin-bottom: 20px;
        }
        .hero button {
            padding: 10px 20px;
            border: none;
            background: var(--btn-bg);
            color: var(--btn-text);
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .hero button:hover {
            opacity: 0.8;
        }
        @media(max-width: 768px) {
            nav {
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                background: var(--nav-bg);
                flex-direction: column;
                align-items: center;
                display: none;
                padding: 15px 0;
                transition: 0.3s ease;
            }
            nav.active {
                display: flex;
            }
            .hamburger {
                display: block;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="logo">Task 3</div>
    <nav id="navLinks">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
    <div class="right-section">
        <div class="hamburger" id="hamburger">☰</div>
        <div class="theme-toggle" id="themeToggle">🌙</div>
    </div>
</header>
<section class="hero">
    <h1>Welcome to my Website</h1>
    <p>This is a responsive navbar with a theme switcher and mobile hamburger menu.</p>
    <button>Get Started</button>
</section>
<script>
    const hamburger = document.getElementById("hamburger");
    const navLinks = document.getElementById("navLinks");
    const themeToggle = document.getElementById("themeToggle");
    hamburger.addEventListener("click", () => {
        navLinks.classList.toggle("active");
    });
    function setTheme(theme) {
        if (theme === "dark") {
            document.body.classList.add("dark");
            themeToggle.textContent = "☀️";
            localStorage.setItem("theme", "dark");
        } else {
            document.body.classList.remove("dark");
            themeToggle.textContent = "🌙";
            localStorage.setItem("theme", "light");
        }
    }
    themeToggle.addEventListener("click", () => {
        if (document.body.classList.contains("dark")) {
            setTheme("light");
        } else {
            setTheme("dark");
        }
    });
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) {
        setTheme(savedTheme);
    }
    window.addEventListener("resize", () => {
        if (window.innerWidth > 768) {
            navLinks.classList.remove("active");
        }
    });
</script>
</body>
</html>
